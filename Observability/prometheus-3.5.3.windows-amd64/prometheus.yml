global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "question-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: [ "localhost:8082" ]

  - job_name: "quiz-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: [ "localhost:8081" ]
